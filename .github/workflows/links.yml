name: Sprawdzanie linków

on:
  pull_request:
    paths: ['**/*.md', '**/*.mdx']
  schedule:
    # raz w tygodniu, poniedziałek 06:00 UTC — łapie linki, które umarły z czasem
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: lychee — weryfikacja linków
        uses: lycheeverse/lychee-action@v2
        with:
          # Linki zaczynające się od "/" to odnośniki wewnętrzne (root-relative).
          # --root-dir tu nie pomoże: Astro (trailingSlash: 'always') mapuje np.
          # /podstawy/czym-jest-ai/ na plik czym-jest-ai.md, a nie na katalog
          # czym-jest-ai/, więc lychee i tak by ich nie rozwiązał. Linki wewnętrzne
          # waliduje już "npm run build" (Astro wywala build przy złamanym linku
          # wewnętrznym) - lychee ma sprawdzać wyłącznie linki zewnętrzne.
          # Kod 999 to celowa blokada LinkedIn wobec botów - link jest sprawny.
          args: >-
            --no-progress
            --accept 200,206,403,429,999
            --exclude '^/'
            'src/content/**/*.md' 'src/content/**/*.mdx' '*.md'
          fail: true
