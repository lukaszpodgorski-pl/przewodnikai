name: Limity mediów

on:
  pull_request:
    paths:
      - 'src/assets/**'
      - 'public/media/**'

jobs:
  rozmiary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sprawdź formaty i rozmiary (obraz ≤ 1 MB, wideo ≤ 5 MB, bez GIF)
        shell: bash
        run: |
          fail=0
          while IFS= read -r -d '' f; do
            size=$(stat -c%s "$f")
            lower="${f,,}"
            case "$lower" in
              *.gif)
                echo "::error file=$f::GIF-y nie są akceptowane — przekonwertuj na WebM/MP4 (zobacz CONTRIBUTING.md)"
                fail=1
                continue
                ;;
              *.webm|*.mp4)
                max=$((5 * 1024 * 1024)); limit="5 MB" ;;
              *)
                max=$((1 * 1024 * 1024)); limit="1 MB" ;;
            esac
            if [ "$size" -gt "$max" ]; then
              echo "::error file=$f::Plik ma $((size / 1024)) KB — limit to $limit (zobacz CONTRIBUTING.md)"
              fail=1
            fi
          done < <(find src/assets public/media -type f -print0 2>/dev/null)
          exit $fail
