name: Lint

on:
  push:
    branches: [main]
    paths: ['**/*.md', '**/*.mdx']
  pull_request:
    paths: ['**/*.md', '**/*.mdx']

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: markdownlint (treść)
        run: npx --yes markdownlint-cli2 "src/content/**/*.md" "*.md"
