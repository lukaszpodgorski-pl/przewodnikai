<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
	<title>Przewodnik AI</title>
	<!--
		Kompas - "przewodnik". Pelna bryla, nie kontur: wariant konturowy
		rozpadal sie w 16 px (igla znikala w pasku kart). Kolor marki
		#0d9488 ma wystarczajacy kontrast i na jasnym, i na ciemnym tle,
		wiec w odroznieniu od poprzedniego favicona ten plik nie potrzebuje
		przelacznika prefers-color-scheme.

		UWAGA: public/og-logo.png jest rasteryzacja tego pliku (144x144)
		i sluzy za logo na kartach OG - po kazdej zmianie ksztaltu trzeba
		go zregenerowac, inaczej karty pokazuja stary znak.
	-->
	<circle cx="64" cy="64" r="56" fill="#0d9488"/>
	<path d="M92 36 L71 71 L36 92 L57 57 Z" fill="#fff"/>
</svg>
